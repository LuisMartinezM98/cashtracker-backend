name: CashTrackr TypeScript CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: cashtrackr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.1.3'
          run_install: false

      - name: Cachear dependencias de pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Validar tipos de TypeScript
        run: pnpm build

      - name: Esperar a que PostgreSQL esté listo
        run: |
          until pg_isready -h localhost -p 5432 -U root; do
            echo "Esperando PostgreSQL..."
            sleep 2
          done

      - name: Ejecutar pruebas (Jest)
        run: pnpm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://root:root@localhost:5432/cashtrackr_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODEMAILER_HOST: ${{ secrets.NODEMAILER_HOST }}
          NODEMAILER_PORT: ${{ secrets.NODEMAILER_PORT }}
          NODEMAILER_USER: ${{ secrets.NODEMAILER_USER }}
          NODEMAILER_PASS: ${{ secrets.NODEMAILER_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Triggerear deploy en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}