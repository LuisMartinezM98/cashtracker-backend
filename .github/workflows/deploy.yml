name: CashTrackr TypeScript CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -----------------------------------------------------------------
  # TRABAJO 1: CI (Instalación, Compilación y Pruebas)
  # -----------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: cashtrackr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.1.3'

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cachear dependencias de pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Validar tipos de TypeScript
        run: pnpm build

      - name: Ejecutar pruebas (Jest)
        run: pnpm test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/cashtrackr_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODEMAILER_HOST: ${{ secrets.NODEMAILER_HOST }}
          NODEMAILER_PORT: ${{ secrets.NODEMAILER_PORT }}
          NODEMAILER_USER: ${{ secrets.NODEMAILER_USER }}
          NODEMAILER_PASS: ${{ secrets.NODEMAILER_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

  # -----------------------------------------------------------------
  # TRABAJO 2: CD (Despliegue en Render)
  # -----------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Triggerear deploy en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}